name: Baseera CI

on:
  push:
    branches: [main, phase-a1-security-hardening]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.BASEERA_CI_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      BASEERA_TEST_CONNECTION: Server=127.0.0.1,1433;Database=Baseera_CI;User Id=sa;Password=${{ secrets.BASEERA_CI_SA_PASSWORD }};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true
      BASEERA_CONNECTION: Server=127.0.0.1,1433;Database=Baseera_CI;User Id=sa;Password=${{ secrets.BASEERA_CI_SA_PASSWORD }};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Wait for SQL Server
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL port is open"
              sleep 8
              exit 0
            fi
            sleep 2
          done
          echo "SQL Server port never opened"
          exit 1
      - name: Restore
        run: dotnet restore src/backend/Baseera.slnx
      - name: Build
        run: dotnet build src/backend/Baseera.slnx --no-restore -c Release
      - name: NuGet vulnerability gate fail-closed self-test
        run: bash scripts/test-nuget-vuln-gate-fail-closed.sh
      - name: Vulnerable package gate
        run: bash scripts/check-nuget-vulnerabilities.sh src/backend/Baseera.slnx
      - name: Unit tests
        run: dotnet test src/backend/tests/Baseera.UnitTests --no-build -c Release --verbosity normal
      - name: Integration tests
        run: |
          set -euo pipefail
          output=$(dotnet test src/backend/tests/Baseera.IntegrationTests -c Release --verbosity normal)
          echo "$output"
          if echo "$output" | grep -qi 'Skipped:'; then
            skipped=$(echo "$output" | sed -n 's/.*Skipped:[[:space:]]*\([0-9][0-9]*\).*/\1/p' | tail -1)
            if [[ -n "${skipped:-}" && "$skipped" != "0" ]]; then
              echo "Integration tests skipped ($skipped). Treat skip as failure in CI."
              exit 1
            fi
          fi
      - name: Apply migrations
        run: |
          set -euo pipefail
          dotnet tool install --global dotnet-ef --version 10.0.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --project src/backend/Baseera.Infrastructure --startup-project src/backend/Baseera.Api

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b --pretty false
      - run: npm run lint
      - run: npm test
      - name: Refuse TestAuth production build
        run: |
          set +e
          VITE_AUTH_MODE=test node scripts/check-production-auth.mjs
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            echo "expected failure for VITE_AUTH_MODE=test"
            exit 1
          fi
      - name: Production build
        env:
          VITE_AUTH_MODE: entra
          VITE_ENTRA_CLIENT_ID: 00000000-0000-0000-0000-000000000001
          VITE_ENTRA_TENANT_ID: 00000000-0000-0000-0000-000000000002
          VITE_ENTRA_API_SCOPE: api://00000000-0000-0000-0000-000000000003/.default
        run: npm run build
      - name: npm audit (high+)
        run: npm audit --audit-level=high

name: Baseera CI

on:
  push:
    branches: [main, phase-a1-security-hardening]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Gitleaks full history
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  backend:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.BASEERA_CI_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      BASEERA_TEST_CONNECTION: Server=127.0.0.1,1433;Database=Baseera_CI;User Id=sa;Password=${{ secrets.BASEERA_CI_SA_PASSWORD }};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true
      BASEERA_CONNECTION: Server=127.0.0.1,1433;Database=Baseera_CI;User Id=sa;Password=${{ secrets.BASEERA_CI_SA_PASSWORD }};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Wait for SQL Server
        env:
          SA_PASSWORD: ${{ secrets.BASEERA_CI_SA_PASSWORD }}
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL port open"
              break
            fi
            sleep 2
            if [[ "$i" -eq 90 ]]; then
              echo "SQL port never opened"
              exit 1
            fi
          done
          # SQL Server accepts TCP before logins work; retry authenticated probe.
          for i in $(seq 1 60); do
            if docker run --rm --network host \
              mcr.microsoft.com/mssql-tools18:latest \
              /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P "$SA_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL authenticated readiness OK"
              exit 0
            fi
            sleep 3
          done
          echo "Falling back to extended warm-up sleep"
          sleep 40
      - name: Restore
        run: dotnet restore src/backend/Baseera.slnx
      - name: Build
        run: dotnet build src/backend/Baseera.slnx --no-restore -c Release
      - name: NuGet vulnerability gate fail-closed self-test
        run: bash scripts/test-nuget-vuln-gate-fail-closed.sh
      - name: Vulnerable package gate
        run: bash scripts/check-nuget-vulnerabilities.sh src/backend/Baseera.slnx
      - name: Unit tests
        run: dotnet test src/backend/tests/Baseera.UnitTests --no-build -c Release --verbosity normal
      - name: Integration tests
        run: |
          set -euo pipefail
          set +e
          dotnet test src/backend/tests/Baseera.IntegrationTests -c Release --logger "console;verbosity=detailed"
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            exit "$status"
          fi
          # Fail closed if any tests were skipped in CI
          summary=$(dotnet test src/backend/tests/Baseera.IntegrationTests -c Release --no-build --verbosity quiet 2>&1 || true)
          if echo "$summary" | grep -E 'Skipped:\s*[1-9]' >/dev/null; then
            echo "Integration tests reported skips; failing CI"
            exit 1
          fi
      - name: Apply migrations
        run: |
          set -euo pipefail
          dotnet tool install --global dotnet-ef --version 10.0.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --project src/backend/Baseera.Infrastructure --startup-project src/backend/Baseera.Api

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b --pretty false
      - run: npm run lint
      - run: npm test
      - name: Refuse TestAuth production build
        run: |
          set +e
          VITE_AUTH_MODE=test node scripts/check-production-auth.mjs
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            echo "expected failure for VITE_AUTH_MODE=test"
            exit 1
          fi
      - name: Production build
        env:
          VITE_AUTH_MODE: entra
          VITE_ENTRA_CLIENT_ID: 00000000-0000-0000-0000-000000000001
          VITE_ENTRA_TENANT_ID: 00000000-0000-0000-0000-000000000002
          VITE_ENTRA_API_SCOPE: api://00000000-0000-0000-0000-000000000003/.default
        run: npm run build
      - name: npm audit (high+)
        run: npm audit --audit-level=high

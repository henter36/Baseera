sonar.projectKey=henter36_Baseera
sonar.organization=henter36

# Generated EF migration artifacts remain compiled and tested.
# Designers and model snapshots are excluded from general analysis.
# All EF migrations are excluded only from copy-paste detection because their
# migrationBuilder structure is generated and inherently repetitive.
sonar.exclusions=**/Persistence/Migrations/*Designer.cs,**/Persistence/Migrations/*ModelSnapshot.cs
sonar.cpd.exclusions=**/Persistence/Migrations/*.cs

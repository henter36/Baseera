sonar.projectKey=henter36_Baseera
sonar.organization=henter36

# Prefer excluding generated EF designers/snapshots. Application migrations are kept
# analyzable after deduplicating Up/Down helpers (Automatic Analysis ignored broad exclusions).
sonar.exclusions=**/Persistence/Migrations/*Designer.cs,**/Persistence/Migrations/*ModelSnapshot.cs
sonar.cpd.exclusions=**/Persistence/Migrations/*Designer.cs,**/Persistence/Migrations/*ModelSnapshot.cs
